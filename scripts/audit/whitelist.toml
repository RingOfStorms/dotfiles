# vulnix CVE whitelist
#
# Suppress CVEs reviewed and accepted as non-applicable (false positives) or
# acceptable risk, so future `nixos-audit` runs surface only real signal.
#
# Pass to the auditor with:  nix run .#audit -- --whitelist scripts/audit/whitelist.toml
#
# Matching (vulnix):
#   ["pname"]              -> suppress ALL findings for that package name
#   ["pname-version"]      -> suppress findings for that exact name+version
#     cve = ["CVE-..."]    -> (optional) restrict to specific CVEs
#   comment = "..."        -> why it's whitelisted (required for review hygiene)
#   until = "YYYY-MM-DD"   -> (optional) expiry; re-review after this date
#
# Curated 2026-05-30 from a vulnix --system scan of lio. Re-review periodically;
# entries here HIDE findings, so keep them tight (prefer exact name+version or a
# specific CVE over a bare pname when a real same-named package also exists).
#
# ════════════════════════════════════════════════════════════════════════════
# Category A — NAME-COLLISION FALSE POSITIVES
# vulnix matches on pname; these language-ecosystem packages share a name with
# the C library a CVE is actually about. The C lib (e.g. real curl/zlib) is NOT
# whitelisted here, so its genuine CVEs still surface. Targeted by exact version.
# ════════════════════════════════════════════════════════════════════════════

["curl-0.4.46"]
comment = "Rust `curl` crate, not the C curl library. CVEs are about C curl."
["curl-0.4.49"]
comment = "Rust `curl` crate, not the C curl library."

["zlib-0.7.1.1"]
comment = "Haskell zlib binding, not C zlib."

["network-3.2.8.0"]
comment = "Haskell `network` library; CVE collision."

["nix-0.30.1"]
comment = "Rust `nix` crate, not the Nix package manager."
["nix-0.31.3"]
comment = "Rust `nix` crate, not the Nix package manager."

["hyper-1.9.0"]
comment = "Haskell/Rust name collision; not the affected component."

["Diff-1.0.2"]
comment = ".NET/other ecosystem lib; pname collision."
["xunit-2.9.3"]
comment = ".NET xUnit; pname collision, not a system package CVE."

["lapack-3"]
comment = "version-string collision (bare '3'); not a real LAPACK CVE match."

