# NOTE: Category B (build-time toolchains: go-*-bootstrap, gcc, binutils, cargo,
# *-vendor, *-source, *-go-modules, *-npm-deps) is intentionally NOT whitelisted
# by bare pname here — their version strings churn on every nixpkgs bump, which
# would make stale entries. They are build inputs, not in the runtime closure;
# treat them as noise in the report rather than maintaining churny entries.
