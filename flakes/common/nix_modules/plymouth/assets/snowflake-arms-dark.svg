<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  White-fill silhouette of the THREE "dark" arms only of the NixOS
  snowflake. Used by the Plymouth neon pipeline as a per-arm-class
  mask: the dark arms get a deeper-orange gradient (#3a0c00 → #f24005)
  while the light arms get a brighter one (#5a1a02 → #FF9038), so the
  alternating-arm structure of the original two-tone logo reads
  through the glow.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 512 512"
     version="1.1">
  <g transform="matrix(1.25,0,0,-1.25,0,512)">
    <g transform="matrix(1.0205226,0,0,1.0205226,0,27.171437)">
      <path fill="#FFFFFF"
            d="m 122.453,169.761 97.758,-169.34 -44.926,-0.422 -26.101,45.496 -26.286,-45.25 -22.32,0.008 -11.433,19.75 37.449,64.394 -26.582,46.258 22.441,39.106 z"/>
      <path fill="#FFFFFF"
            d="m 236,244.386 -195.535,0.011 22.101,39.118 52.45,-0.149 -26.047,45.391 11.168,19.328 22.82,0.023 L 160,283.483 213.352,283.374 236,244.386 Z"/>
      <path fill="#FFFFFF"
            d="m 243.625,108.636 97.777,169.328 22.825,-38.696 -26.348,-45.351 52.332,-0.137 11.152,-19.336 -11.39,-19.777 -74.489,0.238 -26.769,-46.152 -45.09,-0.117 z"/>
    </g>
  </g>
</svg>
