<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Same geometry as snowflake.svg but a single solid white fill.
  Used by the neon glow pipeline as a tintable mask: ImageMagick
  reads this, blurs it, then `+level-colors black,<color>` recolors
  the white to whatever halo / bloom / core color we want for that
  pass. One mask, multiple tinted blurred copies, all screen-blended.
-->
